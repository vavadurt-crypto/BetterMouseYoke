name: Build BetterMouseYoke

on:
  push:
    branches: [ "**" ]
  pull_request:
  release:
    types: [created]

jobs:

  # -----------------------------------------------------------------------
  # Windows → win.xpl
  # -----------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download X-Plane SDK
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://developer.x-plane.com/wp-content/plugins/code-sample-generation/sdk_zip_files/XPSDK401.zip" -OutFile XPSDK.zip
          Expand-Archive XPSDK.zip -DestinationPath XPSDK

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build win.xpl
        shell: cmd
        run: |
          cl.exe /std:c++17 /O2 /EHsc /LD ^
            /DIBM=1 /DAPL=0 /DLIN=0 ^
            /I "XPSDK\CHeaders\XPLM" ^
            /I "XPSDK\CHeaders\Widgets" ^
            BetterMouseYoke.cpp ^
            /link /DLL /OUT:win.xpl ^
            /LIBPATH:"XPSDK\Libraries\Win" ^
            XPLM_64.lib

      - uses: actions/upload-artifact@v4
        with:
          name: win-xpl
          path: win.xpl

  # -----------------------------------------------------------------------
  # macOS → mac.xpl (arm64 + x86_64 universal)
  # -----------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download X-Plane SDK
        run: |
          curl -L "https://developer.x-plane.com/wp-content/plugins/code-sample-generation/sdk_zip_files/XPSDK401.zip" -o XPSDK.zip
          unzip XPSDK.zip -d XPSDK

      - name: Build mac.xpl (arm64 + x86_64)
        run: |
          clang++ -std=c++17 -O2 \
            -DAPL=1 -DIBM=0 -DLIN=0 \
            -arch arm64 -arch x86_64 \
            -I XPSDK/CHeaders/XPLM \
            -I XPSDK/CHeaders/Widgets \
            -F XPSDK/Libraries/Mac \
            -framework XPLM \
            -framework CoreGraphics \
            -framework CoreFoundation \
            -dynamiclib \
            -o mac.xpl \
            BetterMouseYoke.cpp

      - uses: actions/upload-artifact@v4
        with:
          name: mac-xpl
          path: mac.xpl

  # -----------------------------------------------------------------------
  # Linux → lin.xpl
  # -----------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y libx11-dev libxtst-dev

      - name: Download X-Plane SDK
        run: |
          curl -L "https://developer.x-plane.com/wp-content/plugins/code-sample-generation/sdk_zip_files/XPSDK401.zip" -o XPSDK.zip
          unzip XPSDK.zip -d XPSDK

      - name: Build lin.xpl
        run: |
          g++ -std=c++17 -O2 -fPIC \
            -DLIN=1 -DAPL=0 -DIBM=0 \
            -I XPSDK/CHeaders/XPLM \
            -I XPSDK/CHeaders/Widgets \
            -shared \
            -o lin.xpl \
            BetterMouseYoke.cpp \
            -lX11 -lXtst

      - uses: actions/upload-artifact@v4
        with:
          name: lin-xpl
          path: lin.xpl

  # -----------------------------------------------------------------------
  # Package — junta os 3 em um ZIP no formato do plugin
  # -----------------------------------------------------------------------
  package:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: win-xpl
          path: dist/BetterMouseYoke/64

      - uses: actions/download-artifact@v4
        with:
          name: mac-xpl
          path: dist/BetterMouseYoke/64

      - uses: actions/download-artifact@v4
        with:
          name: lin-xpl
          path: dist/BetterMouseYoke/64

      - name: Copy settings.ini
        run: cp settings.ini dist/BetterMouseYoke/settings.ini

      - name: Create ZIP
        run: |
          cd dist
          zip -r ../BetterMouseYoke.zip BetterMouseYoke

      - uses: actions/upload-artifact@v4
        with:
          name: BetterMouseYoke
          path: BetterMouseYoke.zip

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: BetterMouseYoke.zip
