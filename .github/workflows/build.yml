name: Build BetterMouseYoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # -----------------------------------------------------------------------
  # Windows — win.xpl
  # -----------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download X-Plane SDK
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://developer.x-plane.com/wp-content/plugins/code-sample-generation/sdk_zip_files/XPSDK430.zip" -OutFile SDK.zip
          Expand-Archive SDK.zip -DestinationPath .

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload win.xpl
        uses: actions/upload-artifact@v4
        with:
          name: win-xpl
          path: build/Release/win.xpl

  # -----------------------------------------------------------------------
  # macOS — mac.xpl
  # -----------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download X-Plane SDK
        run: |
          curl -L "https://developer.x-plane.com/wp-content/plugins/code-sample-generation/sdk_zip_files/XPSDK430.zip" -o SDK.zip
          unzip SDK.zip

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload mac.xpl
        uses: actions/upload-artifact@v4
        with:
          name: mac-xpl
          path: build/mac.xpl

  # -----------------------------------------------------------------------
  # Linux — lin.xpl
  # -----------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y libx11-dev libxtst-dev

      - name: Download X-Plane SDK
        run: |
          curl -L "https://developer.x-plane.com/wp-content/plugins/code-sample-generation/sdk_zip_files/XPSDK430.zip" -o SDK.zip
          unzip SDK.zip

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload lin.xpl
        uses: actions/upload-artifact@v4
        with:
          name: lin-xpl
          path: build/lin.xpl
